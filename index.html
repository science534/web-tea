<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Ditutup</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            text-transform: uppercase;
            /* Efek Neon Biru/Cyan */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #00d4ff,
                0 0 40px #00d4ff,
                0 0 80px #00d4ff;
            animation: flicker 2s infinite alternate;
        }

        p {
            color: #ff0055;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            /* Efek Neon Pink/Merah */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ff0055,
                0 0 20px #ff0055;
        }

        /* Animasi kedap-kedip biar makin dramatis */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 32%, 57%, 100% {
                text-shadow: 
                    0 0 5px #fff,
                    0 0 10px #fff,
                    0 0 20px #00d4ff,
                    0 0 40px #00d4ff,
                    0 0 80px #00d4ff;
            }
            20%, 24%, 55% {       
                text-shadow: none;
                color: #333;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WEBSITE INI DI TUTUP</h1>
        <p>Karena tidak ada yang mau aploud</p>
        <p style="color: #00ff95; text-shadow: 0 0 10px #00ff95; font-size: 1rem; margin-top: 50px;">
            By Science
        </p>
    </div>

</body>
</html>
